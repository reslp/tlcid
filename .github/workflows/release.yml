name: Release

on:
  push:
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  prepare_release:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ -z "$version" ]]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists for VERSION
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --tags origin "refs/tags/$version" | grep -q "refs/tags/$version"; then
            echo "Tag '$version' already exists on remote."
          else
            git tag "$version"
            git push origin "refs/tags/$version"
            echo "Created and pushed tag '$version'."
          fi

  build:
    needs: prepare_release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow pyqt6

      - name: Build with PyInstaller
        shell: bash
        run: pyinstaller tlcid.spec --clean

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          tar -czf TLCid-linux.tar.gz -C dist TLCid

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/TLCid.app TLCid-macos.zip

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/TLCid\* -DestinationPath TLCid-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tlcid-${{ runner.os }}
          path: |
            TLCid-linux.tar.gz
            TLCid-macos.zip
            TLCid-windows.zip
          if-no-files-found: error

  release:
    needs: [prepare_release, build]
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate release notes (commits since previous tag)
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare_release.outputs.version }}"

          git fetch --tags --force

          previous_tag=""
          while IFS= read -r tag; do
            if [[ "$tag" != "$version" ]]; then
              previous_tag="$tag"
              break
            fi
          done < <(git tag --sort=-version:refname)

          {
            echo "## TLCid $version"
            echo
            if [[ -n "$previous_tag" ]]; then
              echo "Changes since \\`$previous_tag\\`:"
              echo
              git log --no-merges --pretty=format:'- %h %s (%an)' "$previous_tag..HEAD"
            else
              echo "No prior tag found; including full history up to this release:"
              echo
              git log --no-merges --pretty=format:'- %h %s (%an)'
            fi
          } > release_notes.md

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.version }}
          name: TLCid ${{ needs.prepare_release.outputs.version }}
          body_path: release_notes.md
          files: |
            release-artifacts/**/*.zip
            release-artifacts/**/*.tar.gz
          fail_on_unmatched_files: true

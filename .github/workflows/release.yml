name: Release

on:
  push:
    paths:
      - VERSION
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare_release:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ -z "$version" ]]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists for VERSION
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --tags origin "refs/tags/$version" | grep -q "refs/tags/$version"; then
            echo "Tag '$version' already exists on remote."
          else
            git tag "$version"
            git push origin "refs/tags/$version"
            echo "Created and pushed tag '$version'."
          fi

  build:
    needs: prepare_release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download latest tlcid_database.db release asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import pathlib
          import sqlite3
          import time
          import urllib.request

          OWNER = "reslp"
          REPO = "tlcid-database"
          ASSET_NAME = "tlcid_database.db"
          OUT_PATH = pathlib.Path("tlcid_database.db")

          token = os.environ.get("GITHUB_TOKEN", "").strip()

          def request_json(url: str, *, retries: int = 3):
              headers = {
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "tlcid-release-workflow",
              }
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              for attempt in range(1, retries + 1):
                  try:
                      req = urllib.request.Request(url, headers=headers)
                      with urllib.request.urlopen(req) as response:
                          return json.load(response)
                  except Exception as exc:
                      if attempt == retries:
                          raise
                      wait_s = attempt * 2
                      print(f"Attempt {attempt}/{retries} failed ({exc}); retrying in {wait_s}s...")
                      time.sleep(wait_s)

          release = request_json(f"https://api.github.com/repos/{OWNER}/{REPO}/releases/latest")
          assets = release.get("assets", [])
          asset = next((a for a in assets if a.get("name") == ASSET_NAME), None)
          if asset is None:
              available = ", ".join(a.get("name", "<unnamed>") for a in assets)
              raise SystemExit(f"Could not find {ASSET_NAME} in latest release assets. Available: {available}")

          asset_api_url = asset.get("url")
          if not asset_api_url:
              raise SystemExit("Release asset did not include API URL")

          headers = {
              "Accept": "application/octet-stream",
              "User-Agent": "tlcid-release-workflow",
          }
          if token:
              headers["Authorization"] = f"Bearer {token}"

          print(f"Downloading {asset['name']} via GitHub API asset endpoint")
          req = urllib.request.Request(asset_api_url, headers=headers)
          with urllib.request.urlopen(req) as response:
              content_type = (response.headers.get("content-type") or "").lower()
              if "text/html" in content_type:
                  preview = response.read(300).decode("utf-8", errors="replace")
                  raise SystemExit(f"Expected binary database, received HTML (content-type={content_type}): {preview}")
              data = response.read()

          OUT_PATH.write_bytes(data)

          raw = OUT_PATH.read_bytes()
          size = len(raw)
          if size < 1024:
              preview = raw[:300].decode("utf-8", errors="replace")
              raise SystemExit(f"Downloaded {ASSET_NAME} is suspiciously small ({size} bytes): {preview}")

          header = raw[:16]
          if header != b"SQLite format 3\x00":
              text_preview = raw[:300].decode("utf-8", errors="replace")
              if "<html" in text_preview.lower() or "<!doctype" in text_preview.lower() or "not found" in text_preview.lower():
                  raise SystemExit(f"Downloaded file looks like an HTML/error response, not a SQLite DB: {text_preview}")
              raise SystemExit("Downloaded file is not a valid SQLite database header")

          with sqlite3.connect(str(OUT_PATH)) as conn:
              result = conn.execute("PRAGMA integrity_check;").fetchone()
          if not result or result[0] != "ok":
              raise SystemExit(f"Downloaded SQLite database failed integrity_check: {result}")

          print(f"Downloaded {OUT_PATH} ({size} bytes) and passed SQLite integrity_check")
          PY

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow pyqt6

      - name: Build with PyInstaller
        shell: bash
        run: pyinstaller tlcid.spec --clean

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          tar -czf TLCid-linux.tar.gz -C dist TLCid

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/TLCid.app TLCid-macos.zip

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/TLCid\* -DestinationPath TLCid-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tlcid-${{ runner.os }}
          path: |
            TLCid-linux.tar.gz
            TLCid-macos.zip
            TLCid-windows.zip
          if-no-files-found: error

  release:
    needs: [prepare_release, build]
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate release notes (commits since previous tag)
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.prepare_release.outputs.version }}"

          git fetch --tags --force

          previous_tag=""
          while IFS= read -r tag; do
            if [[ "$tag" != "$version" ]]; then
              previous_tag="$tag"
              break
            fi
          done < <(git tag --sort=-version:refname)

          {
            echo "## TLCid $version"
            echo
            if [[ -n "$previous_tag" ]]; then
              echo "Changes since \\`$previous_tag\\`:"
              echo
              git log --no-merges --pretty=format:'- %h %s (%an)' "$previous_tag..HEAD"
            else
              echo "No prior tag found; including full history up to this release:"
              echo
              git log --no-merges --pretty=format:'- %h %s (%an)'
            fi
          } > release_notes.md

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.version }}
          name: TLCid ${{ needs.prepare_release.outputs.version }}
          body_path: release_notes.md
          files: |
            release-artifacts/**/*.zip
            release-artifacts/**/*.tar.gz
          fail_on_unmatched_files: true
